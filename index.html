<script type="module" src="./src/index.ts"></script>
<script type="text/javascript">
  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }

  gtag('js', new Date());
  gtag('config', 'G-5899C1DJM0');

  function getNames() {
    const value = document.querySelector('#in_names').value.trim();
    return value.split(/[,\r\n]/g).map(v => v.trim()).filter(v => !!v);
  }

  function parseName(nameStr) {
    const weightRegex = /(\/\d+)/;
    const countRegex = /(\*\d+)/;
    const hasWeight = weightRegex.test(nameStr);
    const hasCount = countRegex.test(nameStr);
    const name = /^\s*([^\/*]+)?/.exec(nameStr)[1];
    const weight = hasWeight ? parseInt(weightRegex.exec(nameStr)[1].replace('/', '')) : 1;
    const count = hasCount ? parseInt(countRegex.exec(nameStr)[1].replace('*', '')) : 1;
    return {
      name,
      weight,
      count,
    };
  }

  function getReady() {
    const names = getNames();
    window.roulette.setMarbles(names);
    ready = names.length > 0;
    localStorage.setItem('mbr_names', names.join(','));
    switch (winnerType) {
      case 'first':
        setWinnerRank(1);
        break;
      case 'last':
        const total = window.roulette.getCount();
        setWinnerRank(total);
        break;
    }
    updatePhotoUploadUI();
  }

  function loadImageFromBase64(base64) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = base64;
    });
  }

  async function applyStoredImages() {
    const bgData = localStorage.getItem('mbr_bgImage');
    if (bgData) {
      const img = await loadImageFromBase64(bgData);
      window.roulette.setBackgroundImage(img);
      const preview = document.querySelector('#bgImagePreview');
      preview.src = bgData;
      preview.style.display = 'block';
    }

    window.roulette.clearCustomMarbleImages();
    const keys = Object.keys(localStorage);
    for (const key of keys) {
      if (key.startsWith('mbr_photo_')) {
        const name = decodeURIComponent(key.slice('mbr_photo_'.length));
        const data = localStorage.getItem(key);
        const img = await loadImageFromBase64(data);
        window.roulette.setCustomMarbleImage(name, img);
      }
    }
    updatePhotoUploadUI();
  }

  function loadImageFromUrl(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  function compressImage(img, maxW, maxH, quality) {
    const canvas = document.createElement('canvas');
    let w = img.naturalWidth, h = img.naturalHeight;
    const ratio = Math.min(maxW / w, maxH / h, 1);
    canvas.width = Math.round(w * ratio);
    canvas.height = Math.round(h * ratio);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', quality);
  }

  function compressCropSquare(img, size, quality) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const side = Math.min(img.naturalWidth, img.naturalHeight);
    const sx = (img.naturalWidth - side) / 2;
    const sy = (img.naturalHeight - side) / 2;
    ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
    return canvas.toDataURL('image/jpeg', quality);
  }

  async function autoLoadFromDb() {
    let manifest;
    try {
      const res = await fetch('/db/manifest.json');
      if (!res.ok) return;
      manifest = await res.json();
    } catch (e) {
      return;
    }

    if (manifest.background && !localStorage.getItem('mbr_bgImage')) {
      try {
        const img = await loadImageFromUrl('/db/' + encodeURIComponent(manifest.background));
        const compressed = compressImage(img, 1920, 1080, 0.85);
        localStorage.setItem('mbr_bgImage', compressed);
        window.roulette.setBackgroundImage(await loadImageFromBase64(compressed));
        const preview = document.querySelector('#bgImagePreview');
        preview.src = compressed;
        preview.style.display = 'block';
      } catch (e) {}
    }

    for (const name of (manifest.participants || [])) {
      const storageKey = 'mbr_photo_' + encodeURIComponent(name);
      if (!localStorage.getItem(storageKey)) {
        try {
          const img = await loadImageFromUrl('/db/' + encodeURIComponent(name) + '.jpg');
          const compressed = compressCropSquare(img, 200, 0.85);
          localStorage.setItem(storageKey, compressed);
          window.roulette.setCustomMarbleImage(name, await loadImageFromBase64(compressed));
        } catch (e) {}
      }
    }

    const nameInput = document.querySelector('#in_names');
    if (!nameInput.value.trim() && manifest.participants && manifest.participants.length > 0) {
      nameInput.value = manifest.participants.join(',');
      getReady();
    }
  }

  function exportSettings() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('mbr_')) data[key] = localStorage.getItem(key);
    }
    data['mbr_names'] = document.querySelector('#in_names').value;
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'roulette-settings.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  async function importSettings(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      for (const [key, value] of Object.entries(data)) {
        if (key.startsWith('mbr_')) localStorage.setItem(key, value);
      }
      const savedNames = localStorage.getItem('mbr_names');
      if (savedNames) {
        document.querySelector('#in_names').value = savedNames;
        getReady();
      }
      await applyStoredImages();
    } catch (e) {
      alert('설정 파일을 불러오는 데 실패했습니다.');
    }
  }

  function getUniqueNames() {
    const names = getNames();
    const seen = new Set();
    const result = [];
    names.forEach(n => {
      const { name } = parseName(n);
      if (name && !seen.has(name)) {
        seen.add(name);
        result.push(name);
      }
    });
    return result;
  }

  function updatePhotoUploadUI() {
    const container = document.querySelector('#photoUploadList');
    if (!container) return;
    const uniqueNames = getUniqueNames();
    container.innerHTML = '';
    uniqueNames.forEach(name => {
      const row = document.createElement('div');
      row.className = 'photo-upload-row';

      const label = document.createElement('span');
      label.className = 'photo-name-label';
      label.textContent = name;

      const preview = document.createElement('img');
      preview.className = 'photo-preview';
      const stored = localStorage.getItem('mbr_photo_' + encodeURIComponent(name));
      if (stored) {
        preview.src = stored;
        preview.style.display = 'block';
      }

      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.style.display = 'none';
      input.id = 'photo_' + name;

      const btn = document.createElement('button');
      btn.className = 'btn-photo-upload';
      btn.textContent = stored ? '사진 변경' : '사진 추가';
      btn.addEventListener('click', () => input.click());

      input.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const rawImg = await loadImageFromBase64(ev.target.result);
            const compressed = compressCropSquare(rawImg, 200, 0.85);
            try { localStorage.setItem('mbr_photo_' + encodeURIComponent(name), compressed); } catch (e) {}
            preview.src = compressed;
            preview.style.display = 'block';
            btn.textContent = '사진 변경';
            window.roulette.setCustomMarbleImage(name, rawImg);
          } catch (e) {}
        };
        reader.readAsDataURL(file);
      });

      row.appendChild(preview);
      row.appendChild(label);
      row.appendChild(btn);
      row.appendChild(input);
      container.appendChild(row);
    });
  }

  function setWinnerRank(rank) {
    document.querySelector('#in_winningRank').value = rank;
    window.options.winningRank = rank - 1;
    window.roulette.setWinningRank(window.options.winningRank);

    if (winnerType === 'first') {
      document.querySelector('.btn-first-winner').classList.toggle('active', true);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'last') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', true);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'custom') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', true);
    }
  }


  let ready = false;
  let winnerType = 'first';

  document.addEventListener('DOMContentLoaded', () => {
    initialize();
  });

  function initialize() {
    if (!window.roulette || !window.roulette.isReady) {
      console.log('does not loaded yet');
      setTimeout(initialize, 100);
      return;
    }
    console.log('initializing start');

    const urlParams = new URLSearchParams(window.location.search);
    const namesFromUrl = urlParams.get('names');

    if (namesFromUrl) {
      document.querySelector('#in_names').value = namesFromUrl.replace(/,/g, '\n');
    } else {
      const savedNames = localStorage.getItem('mbr_names');
      if (savedNames) {
        document.querySelector('#in_names').value = savedNames;
      }
    }
    document.querySelector('#in_names').addEventListener('input', () => {
      getReady();
    });

    document.querySelector('#in_names').addEventListener('blur', () => {
      const nameSource = getNames();
      const nameSet = new Set();
      const nameCounts = {};
      nameSource.forEach(nameSrc => {
        const name = parseName(nameSrc);
        const key = name.weight > 1 ? `${name.name}/${name.weight}` : name.name;
        if (!nameSet.has(key)) {
          nameSet.add(key);
          nameCounts[key] = 0;
        }
        nameCounts[key] += name.count;
      });
      const result = [];
      Object.keys(nameCounts).forEach(key => {
        if (nameCounts[key] > 1) {
          result.push(`${key}*${nameCounts[key]}`);
        } else {
          result.push(key);
        }
      });

      const oldValue = document.querySelector('#in_names').value;
      const newValue = result.join(',');

      if (oldValue !== newValue) {
        document.querySelector('#in_names').value = newValue;
        getReady();
      }
    });

    document.querySelector('#btnShuffle').addEventListener('click', () => {
      getReady();
    });

    document.querySelector('#btnStart').addEventListener('click', () => {
      if (!ready) return;
      gtag && gtag('event', 'start', {
        'event_category': 'roulette',
        'event_label': 'start',
        'value': window.roulette.getCount(),
      });
      const names = getNames();
      const marbles = names.map(n => {
        const p = parseName(n);
        return { name: p.name, count: p.count };
      });
      if (typeof umami !== 'undefined') {
        umami.track('start', { count: window.roulette.getCount() });
        marbles.forEach(m => {
          umami.track('marble', { name: m.name, count: m.count });
        });
      }
      window.roulette.start();
      document.querySelector('#settings').classList.add('hide');
      document.querySelector('#donate').classList.add('hide');
    });

    document.querySelector('#chkAutoRecording').addEventListener('change', (e) => {
      window.options.autoRecording = e.target.matches(':checked');
      window.roulette.setAutoRecording(window.options.autoRecording);
    });

    document.querySelector('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      window.roulette.setWinningRank(window.options.winningRank);
    });

    document.querySelector('#chkDarkMode').addEventListener('change', (e) => {
      window.options.darkMode = e.target.matches(':checked');
      window.roulette.setTheme(window.options.darkMode ? 'dark' : 'light');
      document.documentElement.classList.toggle('light', !window.options.darkMode);
    });

    document.querySelector('#in_winningRank').addEventListener('change', (e) => {
      const v = parseInt(e.target.value, 10);
      winnerType = 'custom';
      setWinnerRank(isNaN(v) ? 0 : v);
    });

    document.querySelector('.btn-last-winner').addEventListener('click', () => {
      const total = window.roulette.getCount();
      winnerType = 'last';
      setWinnerRank(total);
    });
    document.querySelector('.btn-first-winner').addEventListener('click', () => {
      winnerType = 'first';
      setWinnerRank(1);
    });

    window.roulette.addEventListener('goal', () => {
      ready = false;
      setTimeout(() => {
        document.querySelector('#settings').classList.remove('hide');
        document.querySelector('#donate').classList.remove('hide');
      }, 3000);
    });

    window.roulette.addEventListener('message', (e) => {
      simpleToast(e.detail);
    });

    const toggleBtn = document.querySelector('#btnToggleSettings');
    const collapsible = document.querySelector('.collapsible-rows');
    toggleBtn.addEventListener('click', () => {
      collapsible.classList.toggle('collapsed');
      toggleBtn.querySelector('.toggle-arrow').textContent =
        collapsible.classList.contains('collapsed') ? '▲' : '▼';
    });

    document.querySelector('#btnShuffle').click();

    document.querySelector('#bgImageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const rawImg = await loadImageFromBase64(ev.target.result);
          const compressed = compressImage(rawImg, 1920, 1080, 0.85);
          try { localStorage.setItem('mbr_bgImage', compressed); } catch (e) {}
          document.querySelector('#bgImagePreview').src = compressed;
          document.querySelector('#bgImagePreview').style.display = 'block';
          window.roulette.setBackgroundImage(rawImg);
        } catch (e) {}
      };
      reader.readAsDataURL(file);
    });

    document.querySelector('#btnClearBg').addEventListener('click', () => {
      localStorage.removeItem('mbr_bgImage');
      document.querySelector('#bgImagePreview').style.display = 'none';
      document.querySelector('#bgImageInput').value = '';
      window.roulette.setBackgroundImage(null);
    });

    document.querySelector('#btnExportSettings').addEventListener('click', exportSettings);

    document.querySelector('#importSettingsInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) await importSettings(file);
      e.target.value = '';
    });

    applyStoredImages();
    autoLoadFromDb();

    const maps = window.roulette.getMaps();
    const mapSelector = document.querySelector('#sltMap');
    maps.forEach((map) => {
      const option = document.createElement('option');
      option.value = map.index;
      option.innerHTML = map.title;
      option.setAttribute('data-trans', '');
      window.translateElement(option);
      mapSelector.append(option);
    });
    mapSelector.addEventListener('change', (e) => {
      const index = e.target.value;
      window.roulette.setMap(index);
    });

    // const checkDonateButtonLoaded = () => {
    //   const btn = document.querySelector('span.bmc-btn-text');
    //   if (!btn) {
    //     setTimeout(checkDonateButtonLoaded, 100);
    //   } else {
    //     console.log('donation button has been loaded');
    //     btn.setAttribute('data-trans', '');
    //     window.translateElement(btn);
    //   }
    // };
    // setTimeout(checkDonateButtonLoaded, 100);

    const currentNotice = 6;
    const noticeKey = 'lastViewedNotification';

    const closeNotice = () => {
      document.querySelector('#notice').style.display = 'none';
      localStorage.setItem(noticeKey, currentNotice.toString());
    };

    const openNotice = () => {
      console.log('openNotice');
      document.querySelector('#notice').style.display = 'flex';
    };

    document.querySelector('#closeNotice').addEventListener('click', () => {
      closeNotice();
    });

    document.querySelector('#btnNotice').addEventListener('click', () => {
      openNotice();
    });

    function simpleToast(msg) {
      const toast = document.createElement('div');
      toast.classList.add('toast');
      toast.innerHTML = msg;

      if (window.translateElement) {
        console.log('try to translate');
        window.translateElement(toast);
      }

      document.body.appendChild(toast);
      setTimeout(() => {
        document.body.removeChild(toast);
      }, 1200);
    }

    const checkNotice = () => {
      const lastViewed = localStorage.getItem(noticeKey);
      console.log('lastViewed', lastViewed);
      if (lastViewed === null || Number(lastViewed) < currentNotice) {
        openNotice();
      }
    };

    checkNotice();
  }
</script>
