<div id=settings class=settings>
  <div class=right>
    <button id=btnToggleSettings class=btn-toggle-settings>
      <span data-trans>Settings</span>
      <i class=toggle-arrow>▲</i>
    </button>
    <div class="collapsed collapsible-rows">
      <div class=row>
        <label for=sltMap>
          <i class="icon map"></i>
          <span data-trans>Map</span>
        </label>
        <select id=sltMap></select>
      </div>
      <div class="row row-toggles">
        <div class=toggle-item>
          <label for=chkAutoRecording>
            <i class="icon record"></i>
            <span data-trans>Recording</span>
          </label>
          <input type=checkbox id=chkAutoRecording>
        </div>
        <div class=toggle-item>
          <label for=chkSkill>
            <i class="bomb icon"></i>
            <span data-trans>Using skills</span>
          </label>
          <input type=checkbox id=chkSkill checked>
        </div>
      </div>
      <div class=row>
        <label>
          <i class="icon trophy"></i>
          <span data-trans>The winner is</span>
        </label>
        <div class=btn-group>
          <button class="active btn-first-winner btn-winner" data-trans>First</button>
          <button class="btn-last-winner btn-winner" data-trans>Last</button>
          <input type=number id=in_winningRank value=1 min=1>
        </div>
      </div>
      <div class="row row-theme">
        <div class=theme>
          <i class="icon sun"></i>
          <input type=checkbox id=chkDarkMode checked>
          <i class="icon moon"></i>
        </div>
      </div>
    </div>
  </div>
  <div class=left>
    <h3 data-trans>Enter names below</h3>
    <textarea id=in_names placeholder="Input names separated by commas or line feed here" data-trans=placeholder>수박*2,키위*2,귤*2</textarea>

    <div class=custom-images-section>
      <div class=custom-images-row>
        <label class=custom-images-label>배경 이미지</label>
        <div class=bg-image-controls>
          <input type=file id=bgImageInput accept=image/* style=display:none>
          <button class=btn-photo-upload onclick="document.getElementById('bgImageInput').click()">이미지 선택</button>
          <button id=btnClearBg class=btn-photo-clear>삭제</button>
          <img id=bgImagePreview class=bg-preview style=display:none>
          <div class=bg-margin-controls>
            <div class=bg-margin-item>
              <span class=bg-margin-label>좌우</span>
              <input type=range id=bgMarginX min=-30 max=40 step=1 value=0>
              <span id=bgMarginXValue class=bg-margin-value>0%</span>
            </div>
            <div class=bg-margin-item>
              <span class=bg-margin-label>상하</span>
              <input type=range id=bgMarginY min=-30 max=40 step=1 value=0>
              <span id=bgMarginYValue class=bg-margin-value>0%</span>
            </div>
          </div>
        </div>
      </div>
      <div class=custom-images-row>
        <label class=custom-images-label>당첨 이미지</label>
        <div class=bg-image-controls>
          <input type=file id=winnerImageInput accept=image/* style=display:none>
          <button class=btn-photo-upload onclick="document.getElementById('winnerImageInput').click()">이미지 선택</button>
          <button id=btnClearWinnerImage class=btn-photo-clear>삭제</button>
          <img id=winnerImagePreview class=bg-preview style=display:none>
        </div>
      </div>
      <div class=custom-images-row>
        <label class=custom-images-label>참가자 사진</label>
        <div id=photoUploadList class=photo-upload-list></div>
      </div>
    </div>

    <div class=settings-io-row>
      <button id=btnExportSettings class=btn-io>설정 내보내기</button>
      <input type=file id=importSettingsInput accept=.json style=display:none>
      <button class=btn-io onclick="document.getElementById('importSettingsInput').click()">설정 불러오기</button>
      <button id=btnResetAll class="btn-io btn-io-danger">전체 초기화</button>
    </div>

    <div class=actions>
      <div class=sep></div>
      <button id=btnShuffle>
        <i class="icon shuffle"></i>
        <span data-trans>Shuffle</span>
      </button>
      <button id=btnStart>
        <i class="icon play"></i>
        <span data-trans>Start</span>
      </button>
    </div>
  </div>
</div>
<button id=btnNextGame>다음 게임</button>
